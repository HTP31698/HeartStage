<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Growth Compare - HeartStage</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1f3460;
            --bg-card-selected: #2d4a7c;
            --text-primary: #eee;
            --text-secondary: #aaa;
            --text-muted: #666;
            --accent-green: #4ade80;
            --accent-red: #f87171;
            --accent-blue: #60a5fa;
            --accent-purple: #c084fc;
            --accent-yellow: #fbbf24;
            --accent-cyan: #22d3ee;
            --accent-pink: #f472b6;
            --accent-orange: #fb923c;
            --border-color: #334155;
            --grid-gap: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--accent-cyan);
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .search-box button {
            padding: 10px 20px;
            background: var(--accent-cyan);
            color: var(--bg-dark);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .search-box button:hover {
            background: var(--accent-blue);
        }

        .character-selector {
            display: flex;
            gap: 10px;
        }

        .char-btn {
            padding: 8px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .char-btn:hover {
            border-color: var(--accent-cyan);
        }

        .char-btn.active {
            background: var(--accent-cyan);
            color: var(--bg-dark);
            border-color: var(--accent-cyan);
        }

        /* Instructions */
        .instructions {
            background: var(--bg-card);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 30px;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .instructions span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .key {
            background: var(--bg-dark);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            border: 1px solid var(--border-color);
        }

        /* Main Grid View */
        .main-view {
            display: block;
        }

        .grid-header {
            display: grid;
            grid-template-columns: 80px repeat(10, 1fr);
            gap: var(--grid-gap);
            margin-bottom: var(--grid-gap);
        }

        .grid-header-cell {
            text-align: center;
            padding: 10px;
            font-weight: 600;
            color: var(--accent-yellow);
            font-size: 13px;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 80px repeat(10, 1fr);
            gap: var(--grid-gap);
            margin-bottom: var(--grid-gap);
        }

        .row-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--accent-purple);
            font-size: 14px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        /* Card Styles */
        .card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
            min-height: 200px;
        }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-cyan);
            transform: translateY(-2px);
        }

        .card.selected-a {
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.4);
        }

        .card.selected-b {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.4);
        }

        .card.base {
            border-color: var(--accent-yellow);
        }

        .card-title {
            text-align: center;
            font-weight: 600;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-color);
            font-size: 12px;
        }

        .card.base .card-title {
            color: var(--accent-yellow);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .stat-name {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .stat-value {
            font-weight: 600;
            font-size: 11px;
        }

        .stat-diff {
            font-size: 9px;
            margin-left: 4px;
        }

        .stat-diff.positive {
            color: var(--accent-green);
        }

        .stat-diff.negative {
            color: var(--accent-red);
        }

        .stat-diff.neutral {
            color: var(--text-muted);
        }

        /* Stat Colors */
        .stat-atk_dmg { color: #f87171; }
        .stat-atk_speed { color: #fb923c; }
        .stat-atk_range { color: #fbbf24; }
        .stat-atk_addcount { color: #a3e635; }
        .stat-bullet_count { color: #4ade80; }
        .stat-bullet_speed { color: #22d3ee; }
        .stat-char_hp { color: #60a5fa; }
        .stat-crt_chance { color: #c084fc; }
        .stat-crt_dmg { color: #f472b6; }

        /* Compare View */
        .compare-view {
            display: none;
        }

        .compare-view.active {
            display: block;
        }

        .main-view.hidden {
            display: none;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-cyan);
        }

        .compare-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
        }

        .compare-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            min-width: 320px;
        }

        .compare-card.weaker {
            border-color: var(--accent-blue);
        }

        .compare-card.stronger {
            border-color: var(--accent-purple);
        }

        .compare-card-title {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .compare-card.weaker .compare-card-title {
            color: var(--accent-blue);
        }

        .compare-card.stronger .compare-card-title {
            color: var(--accent-purple);
        }

        .compare-card-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .compare-stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .compare-stat-name {
            font-size: 14px;
            color: var(--text-secondary);
            min-width: 100px;
        }

        .compare-stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .compare-stat-diff {
            font-size: 13px;
            min-width: 120px;
            text-align: right;
        }

        .vs-divider {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-muted);
            padding: 0 20px;
        }

        .vs-divider span {
            background: var(--bg-dark);
            padding: 20px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Grid Container */
        .grid-container {
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .grid-wrapper {
            min-width: 1200px;
        }

        /* Total Power */
        .total-power {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px solid var(--border-color);
            text-align: center;
        }

        .total-power-label {
            font-size: 10px;
            color: var(--text-muted);
        }

        .total-power-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-yellow);
        }

        /* Selection indicator */
        .selection-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px 20px;
            display: none;
            gap: 15px;
            align-items: center;
            z-index: 100;
        }

        .selection-indicator.active {
            display: flex;
        }

        .selection-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .selection-badge {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
        }

        .selection-badge.a {
            background: var(--accent-blue);
            color: var(--bg-dark);
        }

        .selection-badge.b {
            background: var(--accent-purple);
            color: var(--bg-dark);
        }

        .compare-btn {
            padding: 8px 16px;
            background: var(--accent-cyan);
            color: var(--bg-dark);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .compare-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .clear-btn {
            padding: 8px 12px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
        }

        .clear-btn:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Character Growth Compare</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="캐릭터 이름 또는 ID 입력...">
            <button onclick="searchCharacter()">검색</button>
        </div>
        <div class="character-selector">
            <button class="char-btn active" data-char="lia" onclick="selectCharacter('lia')">리아</button>
            <button class="char-btn" data-char="hina" onclick="selectCharacter('hina')">히나</button>
            <button class="char-btn" data-char="sera" onclick="selectCharacter('sera')">세라</button>
            <button class="char-btn" data-char="jian" onclick="selectCharacter('jian')">지안</button>
        </div>
    </div>

    <div class="instructions">
        <span><span class="key">클릭</span> 첫 번째 선택 (A)</span>
        <span><span class="key">Ctrl + 클릭</span> 두 번째 선택 (B)</span>
        <span>두 카드 선택 시 자동으로 비교 화면 전환</span>
        <span>기준: <strong style="color: var(--accent-yellow)">1등급 Lv1</strong></span>
    </div>

    <!-- Main Grid View -->
    <div class="main-view" id="mainView">
        <div class="grid-container">
            <div class="grid-wrapper">
                <div class="grid-header">
                    <div class="grid-header-cell"></div>
                    <div class="grid-header-cell">Lv 1</div>
                    <div class="grid-header-cell">Lv 2</div>
                    <div class="grid-header-cell">Lv 3</div>
                    <div class="grid-header-cell">Lv 4</div>
                    <div class="grid-header-cell">Lv 5</div>
                    <div class="grid-header-cell">Lv 6</div>
                    <div class="grid-header-cell">Lv 7</div>
                    <div class="grid-header-cell">Lv 8</div>
                    <div class="grid-header-cell">Lv 9</div>
                    <div class="grid-header-cell">Lv 10</div>
                </div>
                <div id="gridContent">
                    <!-- Generated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Compare View -->
    <div class="compare-view" id="compareView">
        <button class="back-btn" onclick="backToGrid()">
            ← 뒤로가기
        </button>
        <div class="compare-container" id="compareContainer">
            <!-- Generated by JS -->
        </div>
    </div>

    <!-- Selection Indicator -->
    <div class="selection-indicator" id="selectionIndicator">
        <div class="selection-item" id="selectionA" style="display: none;">
            <span class="selection-badge a">A</span>
            <span id="selectionAText">-</span>
        </div>
        <div class="selection-item" id="selectionB" style="display: none;">
            <span class="selection-badge b">B</span>
            <span id="selectionBText">-</span>
        </div>
        <button class="compare-btn" id="compareBtn" onclick="showCompare()" disabled>비교하기</button>
        <button class="clear-btn" onclick="clearSelection()">초기화</button>
    </div>

    <script>
        // Sample Data (실제로는 CSV나 JSON에서 로드)
        const SAMPLE_DATA = generateSampleData();

        // State
        let currentCharacter = 'lia';
        let selectedA = null;
        let selectedB = null;
        let baseStats = null;

        // Stats Configuration
        const STATS_CONFIG = [
            { key: 'atk_dmg', name: '공격력', format: 'int' },
            { key: 'atk_speed', name: '공속', format: 'float1' },
            { key: 'atk_range', name: '사거리', format: 'float1' },
            { key: 'atk_addcount', name: '추가공격', format: 'float2' },
            { key: 'bullet_count', name: '투사체', format: 'int' },
            { key: 'bullet_speed', name: '탄속', format: 'float1' },
            { key: 'char_hp', name: '체력', format: 'int' },
            { key: 'crt_chance', name: '치확', format: 'percent' },
            { key: 'crt_dmg', name: '치뎀', format: 'percent' }
        ];

        // Generate Sample Data
        function generateSampleData() {
            const characters = ['lia', 'hina', 'sera', 'jian'];
            const data = {};

            characters.forEach(char => {
                data[char] = {};
                for (let rank = 1; rank <= 4; rank++) {
                    data[char][rank] = {};
                    for (let level = 1; level <= 10; level++) {
                        const baseMultiplier = 1 + (rank - 1) * 0.3;
                        const levelMultiplier = 1 + (level - 1) * 0.08;
                        const total = baseMultiplier * levelMultiplier;

                        data[char][rank][level] = {
                            char_name: char === 'lia' ? '리아' : char === 'hina' ? '히나' : char === 'sera' ? '세라' : '지안',
                            char_rank: rank,
                            char_lv: level,
                            atk_dmg: Math.round(110 * total),
                            atk_speed: parseFloat((1.0 + (total - 1) * 0.3).toFixed(2)),
                            atk_range: parseFloat((5.0 + (total - 1) * 0.5).toFixed(1)),
                            atk_addcount: parseFloat((0.1 + (total - 1) * 0.05).toFixed(2)),
                            bullet_count: Math.floor(1 + (rank - 1) * 0.5 + (level - 1) * 0.1),
                            bullet_speed: parseFloat((8 + (total - 1) * 1).toFixed(1)),
                            char_hp: Math.round(900 * total),
                            crt_chance: parseFloat((0.1 + (total - 1) * 0.05).toFixed(2)),
                            crt_dmg: parseFloat((1.5 + (total - 1) * 0.2).toFixed(2))
                        };
                    }
                }
            });

            return data;
        }

        // Format Value
        function formatValue(value, format) {
            switch (format) {
                case 'int': return Math.round(value).toLocaleString();
                case 'float1': return value.toFixed(1);
                case 'float2': return value.toFixed(2);
                case 'percent': return (value * 100).toFixed(1) + '%';
                default: return value;
            }
        }

        // Calculate Diff
        function calcDiff(current, base) {
            const diff = current - base;
            const percent = base !== 0 ? ((current - base) / base) * 100 : 0;
            return { diff, percent };
        }

        // Format Diff
        function formatDiff(diff, percent, format) {
            const sign = diff >= 0 ? '+' : '';
            let diffStr = '';

            switch (format) {
                case 'int': diffStr = Math.round(diff).toLocaleString(); break;
                case 'float1': diffStr = diff.toFixed(1); break;
                case 'float2': diffStr = diff.toFixed(2); break;
                case 'percent': diffStr = (diff * 100).toFixed(1) + '%'; break;
                default: diffStr = diff;
            }

            return `${sign}${diffStr} (${sign}${percent.toFixed(0)}%)`;
        }

        // Format Diff Compact (for grid cards)
        function formatDiffCompact(diff, percent, format) {
            const sign = diff >= 0 ? '+' : '';
            let diffStr = '';

            switch (format) {
                case 'int': diffStr = Math.round(diff).toLocaleString(); break;
                case 'float1': diffStr = diff.toFixed(1); break;
                case 'float2': diffStr = diff.toFixed(2); break;
                case 'percent': diffStr = (diff * 100).toFixed(1) + '%'; break;
                default: diffStr = diff;
            }

            return `${sign}${diffStr} (${sign}${percent.toFixed(0)}%)`;
        }

        // Calculate Total Power
        function calcTotalPower(stats) {
            return Math.round(
                stats.atk_dmg * 1 +
                stats.atk_speed * 100 +
                stats.atk_range * 50 +
                stats.atk_addcount * 500 +
                stats.bullet_count * 200 +
                stats.bullet_speed * 20 +
                stats.char_hp * 0.5 +
                stats.crt_chance * 1000 +
                stats.crt_dmg * 200
            );
        }

        // Select Character
        function selectCharacter(char) {
            currentCharacter = char;
            document.querySelectorAll('.char-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.char === char);
            });
            clearSelection();
            renderGrid();
        }

        // Search Character
        function searchCharacter() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const charMap = {
                '리아': 'lia', 'lia': 'lia',
                '히나': 'hina', 'hina': 'hina',
                '세라': 'sera', 'sera': 'sera',
                '지안': 'jian', 'jian': 'jian'
            };

            if (charMap[query]) {
                selectCharacter(charMap[query]);
            }
        }

        // Render Grid
        function renderGrid() {
            const container = document.getElementById('gridContent');
            const charData = SAMPLE_DATA[currentCharacter];
            baseStats = charData[1][1]; // 1등급 1레벨

            let html = '';

            for (let rank = 1; rank <= 4; rank++) {
                html += `<div class="grid-row">`;
                html += `<div class="row-label">${rank}등급</div>`;

                for (let level = 1; level <= 10; level++) {
                    const stats = charData[rank][level];
                    const isBase = rank === 1 && level === 1;
                    const cardId = `card-${rank}-${level}`;

                    html += `<div class="card ${isBase ? 'base' : ''}"
                                id="${cardId}"
                                data-rank="${rank}"
                                data-level="${level}"
                                onclick="handleCardClick(event, ${rank}, ${level})">`;

                    html += `<div class="card-title">${isBase ? '★ 기준 ★' : `${rank}등급 Lv${level}`}</div>`;

                    STATS_CONFIG.forEach(stat => {
                        const value = stats[stat.key];
                        const { diff, percent } = calcDiff(value, baseStats[stat.key]);
                        const diffClass = diff > 0 ? 'positive' : diff < 0 ? 'negative' : 'neutral';

                        html += `<div class="stat-row">
                            <span class="stat-name">${stat.name}</span>
                            <span class="stat-value stat-${stat.key}">
                                ${formatValue(value, stat.format)}
                                ${!isBase ? `<span class="stat-diff ${diffClass}">${formatDiffCompact(diff, percent, stat.format)}</span>` : ''}
                            </span>
                        </div>`;
                    });

                    // Total Power
                    const power = calcTotalPower(stats);
                    const basePower = calcTotalPower(baseStats);
                    const { diff: powerDiff, percent: powerPercent } = calcDiff(power, basePower);
                    const powerDiffClass = powerDiff > 0 ? 'positive' : powerDiff < 0 ? 'negative' : 'neutral';

                    html += `<div class="total-power">
                        <div class="total-power-label">전투력</div>
                        <div class="total-power-value">
                            ${power.toLocaleString()}
                            ${!isBase ? `<span class="stat-diff ${powerDiffClass}">${formatDiffCompact(powerDiff, powerPercent, 'int')}</span>` : ''}
                        </div>
                    </div>`;

                    html += `</div>`;
                }

                html += `</div>`;
            }

            container.innerHTML = html;
        }

        // Handle Card Click
        function handleCardClick(event, rank, level) {
            const cardId = `card-${rank}-${level}`;
            const card = document.getElementById(cardId);

            if (event.ctrlKey || event.metaKey) {
                // Ctrl + Click = Select B
                if (selectedB) {
                    document.getElementById(`card-${selectedB.rank}-${selectedB.level}`)?.classList.remove('selected-b');
                }
                selectedB = { rank, level };
                card.classList.add('selected-b');
            } else {
                // Normal Click = Select A
                if (selectedA) {
                    document.getElementById(`card-${selectedA.rank}-${selectedA.level}`)?.classList.remove('selected-a');
                }
                selectedA = { rank, level };
                card.classList.add('selected-a');
            }

            updateSelectionIndicator();

            // Auto compare when both selected
            if (selectedA && selectedB) {
                setTimeout(() => showCompare(), 300);
            }
        }

        // Update Selection Indicator
        function updateSelectionIndicator() {
            const indicator = document.getElementById('selectionIndicator');
            const selA = document.getElementById('selectionA');
            const selB = document.getElementById('selectionB');
            const compareBtn = document.getElementById('compareBtn');

            if (selectedA || selectedB) {
                indicator.classList.add('active');
            } else {
                indicator.classList.remove('active');
            }

            if (selectedA) {
                selA.style.display = 'flex';
                document.getElementById('selectionAText').textContent = `${selectedA.rank}등급 Lv${selectedA.level}`;
            } else {
                selA.style.display = 'none';
            }

            if (selectedB) {
                selB.style.display = 'flex';
                document.getElementById('selectionBText').textContent = `${selectedB.rank}등급 Lv${selectedB.level}`;
            } else {
                selB.style.display = 'none';
            }

            compareBtn.disabled = !(selectedA && selectedB);
        }

        // Clear Selection
        function clearSelection() {
            if (selectedA) {
                document.getElementById(`card-${selectedA.rank}-${selectedA.level}`)?.classList.remove('selected-a');
            }
            if (selectedB) {
                document.getElementById(`card-${selectedB.rank}-${selectedB.level}`)?.classList.remove('selected-b');
            }
            selectedA = null;
            selectedB = null;
            updateSelectionIndicator();
        }

        // Show Compare View
        function showCompare() {
            if (!selectedA || !selectedB) return;

            const charData = SAMPLE_DATA[currentCharacter];
            let statsA = charData[selectedA.rank][selectedA.level];
            let statsB = charData[selectedB.rank][selectedB.level];

            // Auto sort: weaker on left
            const powerA = calcTotalPower(statsA);
            const powerB = calcTotalPower(statsB);

            let weaker, stronger, weakerData, strongerData;
            if (powerA <= powerB) {
                weaker = selectedA;
                stronger = selectedB;
                weakerData = statsA;
                strongerData = statsB;
            } else {
                weaker = selectedB;
                stronger = selectedA;
                weakerData = statsB;
                strongerData = statsA;
            }

            const container = document.getElementById('compareContainer');

            let html = `
                <div class="compare-card weaker">
                    <div class="compare-card-title">A (약자)</div>
                    <div class="compare-card-subtitle">${weaker.rank}등급 Lv${weaker.level}</div>
                    ${renderCompareStats(weakerData, baseStats, true)}
                </div>
                <div class="vs-divider">
                    <span>VS</span>
                </div>
                <div class="compare-card stronger">
                    <div class="compare-card-title">B (강자)</div>
                    <div class="compare-card-subtitle">${stronger.rank}등급 Lv${stronger.level}</div>
                    ${renderCompareStats(strongerData, weakerData, false)}
                </div>
            `;

            container.innerHTML = html;

            document.getElementById('mainView').classList.add('hidden');
            document.getElementById('compareView').classList.add('active');
            document.getElementById('selectionIndicator').classList.remove('active');
        }

        // Render Compare Stats
        function renderCompareStats(stats, compareBase, isWeaker) {
            let html = '';

            STATS_CONFIG.forEach(stat => {
                const value = stats[stat.key];
                const { diff, percent } = calcDiff(value, compareBase[stat.key]);
                const diffClass = diff > 0 ? 'positive' : diff < 0 ? 'negative' : 'neutral';

                html += `<div class="compare-stat-row">
                    <span class="compare-stat-name">${stat.name}</span>
                    <span class="compare-stat-value stat-${stat.key}">${formatValue(value, stat.format)}</span>
                    <span class="compare-stat-diff ${diffClass}">
                        ${isWeaker ? '(기준)' : formatDiff(diff, percent, stat.format)}
                    </span>
                </div>`;
            });

            // Total Power
            const power = calcTotalPower(stats);
            const basePower = calcTotalPower(compareBase);
            const { diff: powerDiff, percent: powerPercent } = calcDiff(power, basePower);
            const powerDiffClass = powerDiff > 0 ? 'positive' : powerDiff < 0 ? 'negative' : 'neutral';

            html += `<div class="compare-stat-row" style="border-top: 2px solid var(--border-color); margin-top: 10px; padding-top: 15px;">
                <span class="compare-stat-name" style="color: var(--accent-yellow);">전투력</span>
                <span class="compare-stat-value" style="color: var(--accent-yellow);">${power.toLocaleString()}</span>
                <span class="compare-stat-diff ${powerDiffClass}">
                    ${isWeaker ? '(기준)' : `+${powerDiff.toLocaleString()} (+${powerPercent.toFixed(0)}%)`}
                </span>
            </div>`;

            return html;
        }

        // Back to Grid
        function backToGrid() {
            document.getElementById('mainView').classList.remove('hidden');
            document.getElementById('compareView').classList.remove('active');
            updateSelectionIndicator();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderGrid();

            // Enter key for search
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchCharacter();
            });
        });
    </script>
</body>
</html>
