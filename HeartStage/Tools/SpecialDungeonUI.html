<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특수 던전 UI - 애니메이션 프로토타입</title>
    <style>
        /*
        ============================================
        Unity 프리팹 구조 가이드
        ============================================

        [DungeonItemUI 프리팹 구조]
        DungeonItem (DungeonItemUI.cs, VerticalLayoutGroup, ContentSizeFitter)
        ├── Header (Button) ─ 클릭 영역
        │   ├── Thumbnail (Image)
        │   ├── InfoArea
        │   │   ├── TitleText (TMP)
        │   │   └── SubtitleText (TMP)
        │   └── Arrow (Image) ─ ▼ 아이콘
        │
        ├── ExpandedPanel ─ 애니메이션 대상 (pivot Y=1, top)
        │   └── Content
        │       ├── DescriptionText (TMP)
        │       └── BottomRow
        │           ├── RewardInfo
        │           │   ├── RewardIcon (Image)
        │           │   └── RewardText (TMP)
        │           └── EnterButton (Button)
        │
        └── LockOverlay (비활성 시 숨김)
            ├── LockIcon (Image)
            └── LockText (TMP)

        [SpecialStageUI 프리팹 구조]
        SpecialStageUI (SpecialStageUI.cs, GenericWindow)
        └── Content (VerticalLayoutGroup)
            ├── DungeonItem_FanMeeting
            └── DungeonItem_Extreme (잠금)

        ============================================
        */

        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        :root {
            --pink-light: #FFE4EC;
            --pink-main: #FFB3C6;
            --pink-dark: #FF8FAB;
            --blue-light: #E4F1FF;
            --blue-main: #A8D4FF;
            --purple-light: #F0E4FF;
            --purple-main: #D4B3FF;
            --bg-main: #FDF6F9;
            --bg-card: #FFFFFF;
            --text-dark: #4A4A6A;
            --text-light: #8A8AAA;
            --shadow-soft: rgba(255, 179, 198, 0.3);
        }

        body {
            background: linear-gradient(135deg, var(--pink-light) 0%, var(--blue-light) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        /* ========== 폰 프레임 ========== */
        .phone-frame {
            width: 375px;
            background: var(--bg-main);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px var(--shadow-soft);
            padding: 20px 16px;
        }

        .page-title {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        /* ========== 던전 리스트 컨테이너 ========== */
        .dungeon-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ========== 던전 아이템 ========== */
        .dungeon-item {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            position: relative;
        }

        /* ========== 헤더 (항상 보임) ========== */
        .item-header {
            display: flex;
            align-items: center;
            padding: 14px;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .item-header:hover {
            background: var(--pink-light);
        }

        .item-header:active {
            background: var(--pink-main);
        }

        .thumbnail {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .thumbnail.fan-meeting {
            background: linear-gradient(135deg, var(--pink-main), #FFAA80);
        }

        .thumbnail.extreme {
            background: linear-gradient(135deg, #4A4A6A, #2A2A4A);
        }

        .info-area {
            flex: 1;
            min-width: 0;
        }

        .title-text {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .subtitle-text {
            font-size: 12px;
            color: var(--text-light);
        }

        .arrow {
            width: 20px;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-light);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 12px;
        }

        .dungeon-item.expanded .arrow {
            transform: rotate(180deg);
        }

        /* ========== 확장 패널 (애니메이션 핵심) ========== */
        .expanded-panel {
            /*
             * Unity에서:
             * - RectTransform pivot = (0.5, 1) → 위에서 아래로 펼쳐짐
             * - DOTween.DOScaleY(0→1) 또는 sizeDelta.y 애니메이션
             */
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transform-origin: top center;
            transition:
                max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.25s ease-out;
        }

        .dungeon-item.expanded .expanded-panel {
            max-height: 200px; /* 충분히 큰 값 */
            opacity: 1;
        }

        .expanded-content {
            padding: 0 14px 14px 14px;
            border-top: 1px dashed var(--pink-light);
            margin-top: 0;
            padding-top: 14px;
        }

        .description-text {
            font-size: 13px;
            color: var(--text-dark);
            line-height: 1.6;
            margin-bottom: 14px;
            padding: 10px 12px;
            background: var(--pink-light);
            border-radius: 10px;
        }

        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reward-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-light);
        }

        .reward-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
        }

        .enter-btn {
            background: linear-gradient(135deg, var(--blue-main), var(--purple-main));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .enter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(168, 212, 255, 0.5);
        }

        .enter-btn:active {
            transform: translateY(0);
        }

        /* ========== 잠금 오버레이 ========== */
        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(74, 74, 106, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-radius: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .dungeon-item.locked .lock-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        .dungeon-item.locked .item-header {
            pointer-events: none;
        }

        .lock-icon {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .lock-text {
            color: white;
            font-size: 12px;
            font-weight: 500;
        }

        /* ========== 코드 출력 영역 ========== */
        .code-output {
            margin-top: 20px;
            padding: 16px;
            background: #2d2d2d;
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .code-output pre {
            color: #f8f8f2;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            white-space: pre-wrap;
            margin: 0;
        }

        .code-title {
            color: #88c0d0;
            font-weight: bold;
            margin-bottom: 8px;
        }

        /* ========== 컨트롤 패널 ========== */
        .control-panel {
            margin-top: 16px;
            padding: 12px;
            background: white;
            border-radius: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn.primary {
            background: var(--pink-main);
            color: white;
        }

        .control-btn.secondary {
            background: var(--blue-light);
            color: var(--text-dark);
        }

        .control-btn:hover {
            transform: translateY(-1px);
        }

    </style>
</head>
<body>
    <div>
        <div class="phone-frame">
            <div class="page-title">특별 스테이지</div>

            <div class="dungeon-list">
                <!-- 팬 미팅 (무한 스테이지) -->
                <div class="dungeon-item" id="item-fanmeeting">
                    <div class="item-header" onclick="toggleItem('item-fanmeeting')">
                        <div class="thumbnail fan-meeting">🎤</div>
                        <div class="info-area">
                            <div class="title-text">팬 미팅</div>
                            <div class="subtitle-text">일일 도전 3/3</div>
                        </div>
                        <div class="arrow">▼</div>
                    </div>
                    <div class="expanded-panel">
                        <div class="expanded-content">
                            <div class="description-text">
                                끊임없이 몰려오는 팬들을 사랑으로 진정시키세요!<br>
                                오래 버틸수록 더 많은 보상을 획득합니다.
                            </div>
                            <div class="bottom-row">
                                <div class="reward-info">
                                    <div class="reward-icon"></div>
                                    <span>라이트스틱 획득</span>
                                </div>
                                <button class="enter-btn" onclick="enterStage(90001)">입장</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 극한 난이도 (잠금) -->
                <div class="dungeon-item locked" id="item-extreme">
                    <div class="item-header" onclick="toggleItem('item-extreme')">
                        <div class="thumbnail extreme">🔥</div>
                        <div class="info-area">
                            <div class="title-text">극한 난이도</div>
                            <div class="subtitle-text">최상위 도전</div>
                        </div>
                        <div class="arrow">▼</div>
                    </div>
                    <div class="expanded-panel">
                        <div class="expanded-content">
                            <div class="description-text">
                                극한의 난이도에 도전하세요!
                            </div>
                            <div class="bottom-row">
                                <div class="reward-info">
                                    <div class="reward-icon"></div>
                                    <span>특별 보상</span>
                                </div>
                                <button class="enter-btn">입장</button>
                            </div>
                        </div>
                    </div>
                    <div class="lock-overlay">
                        <div class="lock-icon">🔒</div>
                        <div class="lock-text">4스테이지 클리어 시 해금</div>
                    </div>
                </div>
            </div>

            <!-- 컨트롤 패널 -->
            <div class="control-panel">
                <button class="control-btn primary" onclick="collapseAll()">모두 접기</button>
                <button class="control-btn secondary" onclick="toggleLock('item-extreme')">잠금 토글</button>
                <button class="control-btn secondary" onclick="showUnityCode()">Unity 코드 보기</button>
            </div>
        </div>

        <!-- Unity 코드 출력 -->
        <div class="code-output" id="codeOutput" style="display: none;">
            <pre id="codeContent"></pre>
        </div>
    </div>

    <script>
        let currentExpanded = null;

        function toggleItem(itemId) {
            const item = document.getElementById(itemId);
            if (item.classList.contains('locked')) return;

            const wasExpanded = item.classList.contains('expanded');

            // 다른 아이템 모두 접기 (아코디언)
            document.querySelectorAll('.dungeon-item').forEach(el => {
                el.classList.remove('expanded');
            });

            // 클릭한 아이템 토글
            if (!wasExpanded) {
                item.classList.add('expanded');
                currentExpanded = itemId;
                logAction(`Expand: ${itemId}`);
            } else {
                currentExpanded = null;
                logAction(`Collapse: ${itemId}`);
            }
        }

        function collapseAll() {
            document.querySelectorAll('.dungeon-item').forEach(el => {
                el.classList.remove('expanded');
            });
            currentExpanded = null;
            logAction('CollapseAll');
        }

        function toggleLock(itemId) {
            const item = document.getElementById(itemId);
            item.classList.toggle('locked');
            if (item.classList.contains('locked')) {
                item.classList.remove('expanded');
            }
            logAction(`ToggleLock: ${itemId} → ${item.classList.contains('locked')}`);
        }

        function enterStage(stageId) {
            logAction(`EnterStage: ${stageId}`);
            alert(`LoadSceneManager.Instance.GoInfiniteStage(${stageId})`);
        }

        function logAction(action) {
            console.log(`[DungeonUI] ${action}`);
        }

        function showUnityCode() {
            const output = document.getElementById('codeOutput');
            const content = document.getElementById('codeContent');

            output.style.display = output.style.display === 'none' ? 'block' : 'none';

            content.innerHTML = `<span class="code-title">// DungeonItemUI.cs - DOTween 애니메이션</span>

public void SetExpanded(bool expanded)
{
    if (isExpanded == expanded || isAnimating) return;
    isExpanded = expanded;

    currentTween?.Kill();

    if (isExpanded)
    {
        // 확장: ScaleY 0 → 1
        expandedPanel.SetActive(true);
        expandedPanelRect.localScale = new Vector3(1, 0, 1);
        isAnimating = true;

        currentTween = expandedPanelRect
            .DOScaleY(1f, 0.35f)
            .SetEase(Ease.OutCubic)
            .OnUpdate(RebuildLayout)
            .OnComplete(() => {
                isAnimating = false;
                RebuildLayout();
            });

        OnExpanded?.Invoke(this);
    }
    else
    {
        // 축소: ScaleY 1 → 0
        isAnimating = true;

        currentTween = expandedPanelRect
            .DOScaleY(0f, 0.25f)
            .SetEase(Ease.InCubic)
            .OnUpdate(RebuildLayout)
            .OnComplete(() => {
                expandedPanel.SetActive(false);
                isAnimating = false;
                RebuildLayout();
            });
    }
}

<span class="code-title">// SpecialStageUI.cs - 아코디언 동작</span>

private void OnItemExpanded(DungeonItemUI expandedItem)
{
    // 다른 아이템 모두 축소
    foreach (var item in dungeonItems)
    {
        if (item != null && item != expandedItem)
            item.Collapse();
    }
}

<span class="code-title">// Unity 프리팹 설정</span>
// ExpandedPanel RectTransform:
//   - Pivot: (0.5, 1) ← 위에서 아래로 펼쳐지도록
//   - Anchor: Top-Stretch
//
// DungeonItem:
//   - VerticalLayoutGroup (ChildForceExpand Height: false)
//   - ContentSizeFitter (Vertical: PreferredSize)`;
        }

        // 초기 로그
        console.log('=====================================');
        console.log('특수 던전 UI - 애니메이션 프로토타입');
        console.log('=====================================');
        console.log('클릭하면 아코디언 동작 확인 가능');
    </script>
</body>
</html>
