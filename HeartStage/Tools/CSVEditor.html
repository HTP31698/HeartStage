<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartStage CSV Editor</title>
    <style>
        :root {
            --bg-primary: #1e1e2e;
            --bg-secondary: #2d2d3d;
            --bg-tertiary: #3d3d4d;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #7c3aed;
            --accent-hover: #8b5cf6;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: #4d4d5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 100%;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-danger {
            background: var(--error);
            color: white;
        }

        /* Drop Zone */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
            background: var(--bg-secondary);
        }

        .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(124, 58, 237, 0.1);
        }

        .drop-zone-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .drop-zone-text {
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        /* Info Bar */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .info-value {
            font-weight: 600;
            color: var(--accent);
        }

        /* Table Container */
        .table-container {
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            display: none;
        }

        .table-wrapper {
            overflow: auto;
            max-height: calc(100vh - 320px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            background: var(--bg-tertiary);
            padding: 12px 8px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid var(--accent);
            white-space: nowrap;
        }

        th .col-name {
            display: block;
            font-weight: 600;
        }

        th .col-index {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        td {
            padding: 4px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: rgba(124, 58, 237, 0.05);
        }

        td input {
            width: 100%;
            min-width: 80px;
            padding: 8px;
            border: 1px solid transparent;
            border-radius: 4px;
            background: transparent;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        td input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-tertiary);
        }

        td input.modified {
            background: rgba(245, 158, 11, 0.2);
            border-color: var(--warning);
        }

        td input.error {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--error);
        }

        .row-number {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            text-align: center;
            font-size: 0.75rem;
            min-width: 40px;
            padding: 8px 4px !important;
        }

        /* Row Actions */
        .row-actions {
            display: flex;
            gap: 4px;
            padding: 4px !important;
        }

        .row-actions button {
            padding: 4px 8px;
            font-size: 0.75rem;
            border-radius: 4px;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
        }

        .modal h3 {
            margin-bottom: 15px;
            color: var(--accent);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        /* Validation Panel */
        .validation-panel {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 15px;
            display: none;
        }

        .validation-panel.show {
            display: block;
        }

        .validation-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .validation-item:last-child {
            border-bottom: none;
        }

        .validation-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .validation-icon.success {
            background: var(--success);
        }

        .validation-icon.error {
            background: var(--error);
        }

        .validation-icon.warning {
            background: var(--warning);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 200;
        }

        .toast {
            background: var(--bg-tertiary);
            padding: 12px 20px;
            border-radius: 8px;
            margin-top: 10px;
            animation: slideIn 0.3s ease;
            border-left: 4px solid var(--accent);
        }

        .toast.success {
            border-left-color: var(--success);
        }

        .toast.error {
            border-left-color: var(--error);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Quick Template Buttons */
        .template-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .template-btn {
            padding: 6px 12px;
            font-size: 0.8rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .template-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HeartStage CSV Editor</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="validateAll()">
                    <span>&#10003;</span> 유효성 검사
                </button>
                <button class="btn btn-primary" onclick="addRow()">
                    <span>+</span> 행 추가
                </button>
                <button class="btn btn-success" onclick="downloadCSV()">
                    <span>&#8595;</span> CSV 저장
                </button>
            </div>
        </header>

        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone">
            <div class="drop-zone-icon">📄</div>
            <div class="drop-zone-text">CSV 파일을 드래그하거나 클릭하여 선택하세요</div>
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                파일 선택
            </button>
            <input type="file" id="fileInput" accept=".csv" onchange="handleFileSelect(event)">

            <div class="template-buttons">
                <span style="color: var(--text-secondary); font-size: 0.85rem;">빠른 열기:</span>
                <button class="template-btn" onclick="openTemplate('Character')">CharacterTable</button>
                <button class="template-btn" onclick="openTemplate('Skill')">SkillTable</button>
                <button class="template-btn" onclick="openTemplate('Item')">ItemTable</button>
                <button class="template-btn" onclick="openTemplate('Monster')">MonsterTable</button>
                <button class="template-btn" onclick="openTemplate('Quest')">QuestTable</button>
                <button class="template-btn" onclick="openTemplate('Stage')">StageTable</button>
            </div>
        </div>

        <!-- Validation Panel -->
        <div class="validation-panel" id="validationPanel">
            <h4 style="margin-bottom: 10px;">유효성 검사 결과</h4>
            <div id="validationResults"></div>
        </div>

        <!-- Info Bar -->
        <div class="info-bar" id="infoBar" style="display: none;">
            <div class="info-item">
                <span class="info-label">파일명:</span>
                <span class="info-value" id="fileName">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">컬럼:</span>
                <span class="info-value" id="colCount">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">행:</span>
                <span class="info-value" id="rowCount">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">수정됨:</span>
                <span class="info-value" id="modifiedCount">0</span>
            </div>
        </div>

        <!-- Table Container -->
        <div class="table-container" id="tableContainer">
            <div class="toolbar">
                <input type="text" class="search-box" placeholder="검색..." id="searchBox" oninput="filterTable()">
                <button class="btn btn-secondary" onclick="resetChanges()">변경 취소</button>
                <button class="btn btn-danger" onclick="deleteSelectedRows()">선택 행 삭제</button>
            </div>
            <div class="table-wrapper">
                <table id="dataTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="status-bar">
                <span id="statusText">준비됨</span>
                <span id="lastModified"></span>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Add Row Modal -->
    <div class="modal-overlay" id="addRowModal">
        <div class="modal">
            <h3>새 행 추가</h3>
            <p>새로운 빈 행을 테이블 끝에 추가합니다.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('addRowModal')">취소</button>
                <button class="btn btn-primary" onclick="confirmAddRow()">추가</button>
            </div>
        </div>
    </div>

    <script>
        // Global State
        let csvData = [];
        let headers = [];
        let originalData = [];
        let currentFileName = '';
        let modifiedCells = new Set();

        // File Handling
        const dropZone = document.getElementById('dropZone');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.csv')) {
                loadFile(file);
            } else {
                showToast('CSV 파일만 지원됩니다.', 'error');
            }
        });

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                loadFile(file);
            }
        }

        function loadFile(file) {
            currentFileName = file.name;
            const reader = new FileReader();
            reader.onload = (e) => {
                parseCSV(e.target.result);
                showToast(`${file.name} 로드 완료!`, 'success');
            };
            reader.readAsText(file, 'UTF-8');
        }

        function openTemplate(type) {
            showToast(`${type}Table.csv 파일을 Assets/DataTables/ 에서 선택해주세요`, 'info');
            document.getElementById('fileInput').click();
        }

        // CSV Parsing
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            if (lines.length === 0) return;

            // Parse headers
            headers = parseCSVLine(lines[0]);

            // Parse data
            csvData = [];
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim()) {
                    csvData.push(parseCSVLine(lines[i]));
                }
            }

            // Store original for comparison
            originalData = JSON.parse(JSON.stringify(csvData));
            modifiedCells.clear();

            renderTable();
            updateInfo();
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];

                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        // Rendering
        function renderTable() {
            document.getElementById('dropZone').style.display = 'none';
            document.getElementById('tableContainer').style.display = 'block';
            document.getElementById('infoBar').style.display = 'flex';

            // Render headers
            const thead = document.getElementById('tableHead');
            let headerHTML = '<tr><th class="row-number">#</th>';
            headers.forEach((h, i) => {
                headerHTML += `<th><span class="col-name">${h}</span><span class="col-index">col ${i}</span></th>`;
            });
            headerHTML += '<th>Actions</th></tr>';
            thead.innerHTML = headerHTML;

            // Render body
            renderBody();
        }

        function renderBody(filterText = '') {
            const tbody = document.getElementById('tableBody');
            let bodyHTML = '';

            csvData.forEach((row, rowIndex) => {
                // Filter
                if (filterText) {
                    const rowText = row.join(' ').toLowerCase();
                    if (!rowText.includes(filterText.toLowerCase())) {
                        return;
                    }
                }

                bodyHTML += `<tr data-row="${rowIndex}">`;
                bodyHTML += `<td class="row-number">${rowIndex + 1}</td>`;

                row.forEach((cell, colIndex) => {
                    const cellKey = `${rowIndex}-${colIndex}`;
                    const isModified = modifiedCells.has(cellKey);
                    const modifiedClass = isModified ? 'modified' : '';
                    bodyHTML += `<td><input type="text" value="${escapeHTML(cell)}"
                        data-row="${rowIndex}" data-col="${colIndex}"
                        class="${modifiedClass}"
                        onchange="handleCellChange(this)"
                        onfocus="this.select()"></td>`;
                });

                bodyHTML += `<td class="row-actions">
                    <button class="btn btn-secondary" onclick="duplicateRow(${rowIndex})">복제</button>
                    <button class="btn btn-danger" onclick="deleteRow(${rowIndex})">삭제</button>
                </td>`;
                bodyHTML += '</tr>';
            });

            tbody.innerHTML = bodyHTML;
            updateStatus(`${csvData.length}개 행 표시됨`);
        }

        function escapeHTML(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // Cell Handling
        function handleCellChange(input) {
            const row = parseInt(input.dataset.row);
            const col = parseInt(input.dataset.col);
            const newValue = input.value;
            const cellKey = `${row}-${col}`;

            csvData[row][col] = newValue;

            // Check if modified from original
            if (originalData[row] && originalData[row][col] !== newValue) {
                modifiedCells.add(cellKey);
                input.classList.add('modified');
            } else {
                modifiedCells.delete(cellKey);
                input.classList.remove('modified');
            }

            updateInfo();
            document.getElementById('lastModified').textContent = `마지막 수정: ${new Date().toLocaleTimeString()}`;
        }

        // Row Operations
        function addRow() {
            const newRow = headers.map(() => '');
            csvData.push(newRow);
            renderBody(document.getElementById('searchBox').value);
            updateInfo();
            showToast('새 행이 추가되었습니다.', 'success');

            // Scroll to bottom
            const wrapper = document.querySelector('.table-wrapper');
            wrapper.scrollTop = wrapper.scrollHeight;
        }

        function duplicateRow(rowIndex) {
            const newRow = [...csvData[rowIndex]];
            csvData.splice(rowIndex + 1, 0, newRow);
            renderBody(document.getElementById('searchBox').value);
            updateInfo();
            showToast('행이 복제되었습니다.', 'success');
        }

        function deleteRow(rowIndex) {
            if (confirm(`${rowIndex + 1}번 행을 삭제하시겠습니까?`)) {
                csvData.splice(rowIndex, 1);
                // Update modified cells
                modifiedCells = new Set([...modifiedCells].filter(key => {
                    const [r] = key.split('-').map(Number);
                    return r !== rowIndex;
                }));
                renderBody(document.getElementById('searchBox').value);
                updateInfo();
                showToast('행이 삭제되었습니다.', 'success');
            }
        }

        function deleteSelectedRows() {
            showToast('행을 선택 후 개별 삭제 버튼을 사용해주세요.', 'info');
        }

        // Search
        function filterTable() {
            const filterText = document.getElementById('searchBox').value;
            renderBody(filterText);
        }

        // Validation
        function validateAll() {
            const panel = document.getElementById('validationPanel');
            const results = document.getElementById('validationResults');
            let html = '';
            let errors = 0;
            let warnings = 0;

            // Check for empty required fields (first column usually ID)
            csvData.forEach((row, i) => {
                if (!row[0] || row[0].trim() === '') {
                    html += createValidationItem('error', `행 ${i + 1}: ID(첫 번째 컬럼)가 비어있습니다.`);
                    errors++;
                }
            });

            // Check for duplicate IDs
            const ids = csvData.map(row => row[0]);
            const duplicates = ids.filter((id, index) => ids.indexOf(id) !== index);
            if (duplicates.length > 0) {
                html += createValidationItem('error', `중복 ID 발견: ${[...new Set(duplicates)].join(', ')}`);
                errors++;
            }

            // Check for numeric fields
            csvData.forEach((row, i) => {
                row.forEach((cell, j) => {
                    // Assume columns with 'id', 'ID', 'amount', 'count', 'lv' etc. should be numeric
                    const header = headers[j]?.toLowerCase() || '';
                    if ((header.includes('id') || header.includes('amount') ||
                         header.includes('count') || header.includes('lv') ||
                         header.includes('dmg') || header.includes('hp')) && cell) {
                        if (isNaN(Number(cell))) {
                            html += createValidationItem('warning', `행 ${i + 1}, ${headers[j]}: 숫자가 아닌 값 "${cell}"`);
                            warnings++;
                        }
                    }
                });
            });

            // Summary
            if (errors === 0 && warnings === 0) {
                html = createValidationItem('success', '모든 유효성 검사를 통과했습니다!');
            } else {
                html = `<div style="margin-bottom: 10px; color: var(--text-secondary);">
                    오류: ${errors}개, 경고: ${warnings}개
                </div>` + html;
            }

            results.innerHTML = html;
            panel.classList.add('show');
        }

        function createValidationItem(type, message) {
            const icons = { success: '✓', error: '✕', warning: '!' };
            return `<div class="validation-item">
                <span class="validation-icon ${type}">${icons[type]}</span>
                <span>${message}</span>
            </div>`;
        }

        // Export
        function downloadCSV() {
            if (csvData.length === 0) {
                showToast('저장할 데이터가 없습니다.', 'error');
                return;
            }

            let csv = headers.join(',') + '\n';
            csvData.forEach(row => {
                csv += row.map(cell => {
                    // Escape quotes and wrap in quotes if contains comma
                    if (cell.includes(',') || cell.includes('"') || cell.includes('\n')) {
                        return `"${cell.replace(/"/g, '""')}"`;
                    }
                    return cell;
                }).join(',') + '\n';
            });

            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = currentFileName || 'export.csv';
            link.click();

            showToast(`${currentFileName} 저장 완료!`, 'success');
        }

        // Reset
        function resetChanges() {
            if (confirm('모든 변경사항을 취소하시겠습니까?')) {
                csvData = JSON.parse(JSON.stringify(originalData));
                modifiedCells.clear();
                renderBody();
                updateInfo();
                showToast('변경사항이 취소되었습니다.', 'success');
            }
        }

        // UI Updates
        function updateInfo() {
            document.getElementById('fileName').textContent = currentFileName || '-';
            document.getElementById('colCount').textContent = headers.length;
            document.getElementById('rowCount').textContent = csvData.length;
            document.getElementById('modifiedCount').textContent = modifiedCells.size;
        }

        function updateStatus(text) {
            document.getElementById('statusText').textContent = text;
        }

        // Toast
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Modal
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function confirmAddRow() {
            addRow();
            closeModal('addRowModal');
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl+S to save
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                downloadCSV();
            }
            // Ctrl+F to focus search
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                document.getElementById('searchBox')?.focus();
            }
        });
    </script>
</body>
</html>
